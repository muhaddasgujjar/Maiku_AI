<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #09090b;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    .logo-wrap {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 18px;
      box-shadow: 0 8px 32px rgba(99,102,241,0.4);
      animation: pop .5s cubic-bezier(.34,1.56,.64,1) both;
    }

    .app-name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
      animation: fade-up .5s .1s ease both;
    }

    .app-sub {
      font-size: 12px;
      color: #64748b;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 32px;
      animation: fade-up .5s .15s ease both;
    }

    .dots {
      display: flex;
      gap: 8px;
      animation: fade-up .5s .2s ease both;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #6366f1;
      animation: bounce 1.2s ease infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; background: #818cf8; }
    .dot:nth-child(3) { animation-delay: .4s; background: #a78bfa; }

    .status {
      margin-top: 20px;
      font-size: 11px;
      color: #475569;
      font-weight: 500;
      letter-spacing: 0.03em;
      animation: fade-up .5s .25s ease both;
    }

    @keyframes pop {
      from { transform: scale(.7); opacity: 0; }
      to   { transform: scale(1);  opacity: 1; }
    }
    @keyframes fade-up {
      from { transform: translateY(10px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .5; }
      40%           { transform: translateY(-8px); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="logo-wrap">🎯</div>
  <div class="app-name">Maiku AI</div>
  <div class="app-sub">Interview Copilot</div>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="status" id="status">Starting AI backend…</div>

  <script>
    // Cycle status messages so user knows it's doing something
    const msgs = [
      'Starting AI backend…',
      'Loading AI models…',
      'Initializing audio pipeline…',
      'Almost ready…',
    ]
    let i = 0
    setInterval(() => {
      i = (i + 1) % msgs.length
      document.getElementById('status').textContent = msgs[i]
    }, 3500)
  </script>
</body>
</html>
